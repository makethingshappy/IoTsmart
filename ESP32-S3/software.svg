<text x="146" y="32" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#ffffff">MQTT</text>
<rect x="192" y="10" width="72" height="34" rx="17" fill="#007a4a"/>
<text x="228" y="32" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#ffffff">Blynk</text>
